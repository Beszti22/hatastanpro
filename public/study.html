let learnedIds = [];
let irrelevantIds = [];
let previousDrug = null;   // az egyel előző kártya
let previousFilteredList = null; // az előző állapot

function loadIrrelevant() {
    try {
        const s = localStorage.getItem('soteIrrelevant');
        if (s) irrelevantIds = JSON.parse(s);
    } catch(e) {}
}
function saveIrrelevant() {
    try { localStorage.setItem('soteIrrelevant', JSON.stringify(irrelevantIds)); } catch(e) {}
}
    let currentFilteredList = [];
    let currentDrug = null;

    // Biztonságos localStorage kezelés Mac/Safari miatt
    function loadProgress() {
        try {
            const saved = localStorage.getItem('soteProProgress');
            if (saved) learnedIds = JSON.parse(saved);
        } catch (e) { console.warn("Helyi mentés blokkolva, de a kvíz működik."); }
    }

    function saveProgress() {
        try {
            localStorage.setItem('soteProProgress', JSON.stringify(learnedIds));
        } catch (e) {}
    }

    function init() {
    loadProgress();
    loadIrrelevant();
    populateCategories();
    changeCategory();
}

    function populateCategories() {
        const select = document.getElementById('categoryFilter');
        const categories = [...new Set(allDrugs.map(d => d.category))];
        categories.sort().forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.innerText = `📂 ${cat}`;
            select.appendChild(option);
        });
    }

    function changeCategory() {
    previousDrug = null;
    previousFilteredList = null;
    updateBackBtn();
    const category = document.getElementById('categoryFilter').value;
    let filteredByCategory = category === "All" ? allDrugs : allDrugs.filter(d => d.category === category);
    currentFilteredList = filteredByCategory.filter(d => !learnedIds.includes(d.id) && !irrelevantIds.includes(d.id));
    updateStats(filteredByCategory.length);
    nextQuestion();
}

function nextQuestion() {
    if (allDrugs.length === 0) {
        document.getElementById('drugName').innerText = "NINCS ADAT";
        return;
    }
    if (currentFilteredList.length === 0) {
        document.getElementById('drugName').innerText = "🎉 MINDENT MEGTANULTÁL!";
        document.getElementById('statsText').innerText = "Válts kategóriát, vagy nullázd a haladást!";
        document.getElementById('actionAreaReveal').classList.add('hidden');
        document.getElementById('actionAreaRate').classList.add('hidden');
        document.getElementById('answerSection').classList.remove('visible');
        return;
    }

    const randIndex = Math.floor(Math.random() * currentFilteredList.length);
    // Mentjük az előző állapotot MIELŐTT felülírjuk
    previousDrug = currentDrug;
    previousFilteredList = currentFilteredList ? [...currentFilteredList] : null;
    
    currentDrug = currentFilteredList[randIndex];

    document.getElementById('drugName').innerText = currentDrug.name;
    document.getElementById('mechanism').innerText = currentDrug.mech;
    document.querySelector('#sideEffects span').innerText = currentDrug.side;
    document.getElementById('indicationsBody').innerHTML = '<span style="opacity:.6;font-size:13px;">Fordítsd meg a kártyát az indikációkért.</span>';

    document.getElementById('answerSection').classList.remove('visible');
    document.getElementById('actionAreaReveal').classList.remove('hidden');
    document.getElementById('actionAreaRate').classList.add('hidden');
    
    updateBackBtn();
}

function handleResult(wasCorrect) {
    if (wasCorrect) {
        learnedIds.push(currentDrug.id);
        saveProgress();
        showToast("Sikeresen rögzítve! 🧠", true);
        currentFilteredList = currentFilteredList.filter(d => d.id !== currentDrug.id);
        previousDrug = null; // ha megtanulta, nem léphet vissza
        previousFilteredList = null;
        updateBackBtn();
    } else {
        showToast("Visszakerült a pakliba! 🔄", false);
    }

    const category = document.getElementById('categoryFilter').value;
    const totalInCategory = category === "All" ? allDrugs.length : allDrugs.filter(d => d.category === category).length;
    updateStats(totalInCategory);
    
    setTimeout(() => { nextQuestion(); }, 400);
}

// ── VISSZA gomb ──────────────────────────────────────
function goBack() {
    if (!previousDrug || !previousFilteredList) return;
    
    // Visszaállítjuk az előző állapotot
    currentDrug = previousDrug;
    currentFilteredList = previousFilteredList;
    previousDrug = null;
    previousFilteredList = null;

    document.getElementById('drugName').innerText = currentDrug.name;
    document.getElementById('mechanism').innerText = currentDrug.mech;
    document.querySelector('#sideEffects span').innerText = currentDrug.side;
    document.getElementById('indicationsBody').innerHTML = '<span style="opacity:.6;font-size:13px;">Fordítsd meg a kártyát az indikációkért.</span>';

    document.getElementById('answerSection').classList.remove('visible');
    document.getElementById('actionAreaReveal').classList.remove('hidden');
    document.getElementById('actionAreaRate').classList.add('hidden');
    
    updateBackBtn();
}

function updateBackBtn() {
    const btn = document.getElementById('backBtn');
    if (!btn) return;
    btn.disabled = !previousDrug;
}

// ── NEM RELEVÁNS ─────────────────────────────────────
function markIrrelevant() {
    if (!currentDrug) return;
    if (irrelevantIds.includes(currentDrug.id)) {
        showToast("Már meg van jelölve! 🚫", false);
        return;
    }
    irrelevantIds.push(currentDrug.id);
    saveIrrelevant();
    showToast(`"${currentDrug.name}" megjelölve 🚫`, false);
    currentFilteredList = currentFilteredList.filter(d => d.id !== currentDrug.id);
    previousDrug = null;
    previousFilteredList = null;
    updateBackBtn();

    const category = document.getElementById('categoryFilter').value;
    const totalInCategory = category === "All" ? allDrugs.length : allDrugs.filter(d => d.category === category).length;
    updateStats(totalInCategory);
    setTimeout(() => { nextQuestion(); }, 400);
}

// ── IRRELEVÁNS PANEL ─────────────────────────────────
function openIrrPanel() {
    renderIrrList();
    document.getElementById('irrOverlay').classList.add('open');
}

function closeIrrPanel(e) {
    if (e && e.target !== document.getElementById('irrOverlay')) return;
    document.getElementById('irrOverlay').classList.remove('open');
}

function renderIrrList() {
    const list = document.getElementById('irrList');
    if (irrelevantIds.length === 0) {
        list.innerHTML = '<div class="irr-empty">Még nincsenek megjelölt hatóanyagok.<br><span style="opacity:.6;font-size:12px;">A 🚫 gombbal tudod megjelölni a számodra nem releváns anyagokat.</span></div>';
        return;
    }
    const drugs = irrelevantIds.map(id => allDrugs.find(d => d.id === id)).filter(Boolean);
    list.innerHTML = drugs.map(d => `
        <div class="irr-item" id="irr-${d.id}">
            <div style="flex:1">
                <div class="irr-item-name">${d.name}</div>
                <div class="irr-item-cat">${d.category}</div>
            </div>
            <button class="irr-item-del" onclick="removeIrrelevant('${d.id}')">✕ Visszaállít</button>
        </div>
    `).join('');
}

function removeIrrelevant(id) {
    irrelevantIds = irrelevantIds.filter(x => x !== id);
    saveIrrelevant();
    // Visszakerül a paklijába
    changeCategory();
    renderIrrList();
}

function clearAllIrrelevant() {
    if (!confirm(`Biztosan visszaállítod mind a ${irrelevantIds.length} megjelölt hatóanyagot?`)) return;
    irrelevantIds = [];
    saveIrrelevant();
    changeCategory();
    renderIrrList();
}

function exportIrrelevantList() {
    if (irrelevantIds.length === 0) {
        showToast("Nincs megjelölt hatóanyag!", false);
        return;
    }
    const drugs = irrelevantIds.map(id => allDrugs.find(d => d.id === id)).filter(Boolean);
    const text = drugs.map(d => `${d.name} (${d.category}) — id: ${d.id}`).join('\n');
    navigator.clipboard.writeText(text).then(() => {
        showToast(`${drugs.length} hatóanyag másolva! 📋`, true);
    }).catch(() => {
        // Fallback: prompt-ban mutatjuk
        prompt("Másold ki a listát:", text);
    });
}

        const percent = totalInCategory === 0 ? 0 : (learned / totalInCategory) * 100;

        document.getElementById('progressBar').style.width = `${percent}%`;

    }

        }

        const category = document.getElementById('categoryFilter').value;
        const totalInCategory = category === "All" ? allDrugs.length : allDrugs.filter(d => d.category === category).length;
        updateStats(totalInCategory);
        
        setTimeout(() => { nextQuestion(); }, 400); // Rövid szünet a kényelmes olvasáshoz
    }

    // ==========================================
    // OFFLINE – Alkalmazás (indikációk)
    // ==========================================
    let _indicationsData = null;
    let _indicationsPromise = null;
    async function getAllIndications(){
        if (_indicationsData) return _indicationsData;
        if (!_indicationsPromise) {
            _indicationsPromise = fetch('/indications.json', { cache: 'force-cache' })
                .then(r => r.ok ? r.json() : {})
                .then(d => { _indicationsData = d || {}; return _indicationsData; })
                .catch(() => { _indicationsData = {}; return _indicationsData; });
        }
        return _indicationsPromise;
    }

    function renderIndications(state, data){
        const body = document.getElementById('indicationsBody');
        if (state === 'loading') {
            body.innerHTML = '<span class="spinner"></span><span style="font-size:13px;opacity:.8;">Lekérés folyamatban…</span>';
        } else if (state === 'error') {
            body.innerHTML = `<div class="err">${data}</div>`;
        } else if (state === 'data') {
            if (!Array.isArray(data) || data.length === 0) {
                body.innerHTML = '<span style="opacity:.7;font-size:13px;">Nincs elérhető indikáció.</span>';
            } else {
                body.innerHTML = '<ul>' + data.map(x => `<li>${escapeHtml(String(x))}</li>`).join('') + '</ul>';
            }
        }
    }

    function escapeHtml(s){
        return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    let lastIndicationsRequestId = 0;
    async function loadIndications(drug){
        const reqId = ++lastIndicationsRequestId;
        renderIndications('loading');
        try {
            const all = await getAllIndications();
            const data = all[drug.id] || [];
            if (reqId === lastIndicationsRequestId)
                renderIndications('data', data);
        } catch (err) {
            if (reqId === lastIndicationsRequestId)
                renderIndications('error', err.message || 'Ismeretlen hiba.');
        }
    }
// ── VISSZA gomb ──────────────────────────────────────
function goBack() {
    if (!previousDrug || !previousFilteredList) return;
    
    // Visszaállítjuk az előző állapotot
    currentDrug = previousDrug;
    currentFilteredList = previousFilteredList;
    previousDrug = null;
    previousFilteredList = null;

    document.getElementById('drugName').innerText = currentDrug.name;
    document.getElementById('mechanism').innerText = currentDrug.mech;
    document.querySelector('#sideEffects span').innerText = currentDrug.side;
    document.getElementById('indicationsBody').innerHTML = '<span style="opacity:.6;font-size:13px;">Fordítsd meg a kártyát az indikációkért.</span>';

    document.getElementById('answerSection').classList.remove('visible');
    document.getElementById('actionAreaReveal').classList.remove('hidden');
    document.getElementById('actionAreaRate').classList.add('hidden');
    
    updateBackBtn();
}

function updateBackBtn() {
    const btn = document.getElementById('backBtn');
    if (!btn) return;
    btn.disabled = !previousDrug;
}

// ── NEM RELEVÁNS ─────────────────────────────────────
function markIrrelevant() {
    if (!currentDrug) return;
    if (irrelevantIds.includes(currentDrug.id)) {
        showToast("Már meg van jelölve! 🚫", false);
        return;
    }
    irrelevantIds.push(currentDrug.id);
    saveIrrelevant();
    showToast(`"${currentDrug.name}" megjelölve 🚫`, false);
    currentFilteredList = currentFilteredList.filter(d => d.id !== currentDrug.id);
    previousDrug = null;
    previousFilteredList = null;
    updateBackBtn();

    const category = document.getElementById('categoryFilter').value;
    const totalInCategory = category === "All" ? allDrugs.length : allDrugs.filter(d => d.category === category).length;
    updateStats(totalInCategory);
    setTimeout(() => { nextQuestion(); }, 400);
}

// ── IRRELEVÁNS PANEL ─────────────────────────────────
function openIrrPanel() {
    renderIrrList();
    document.getElementById('irrOverlay').classList.add('open');
}

function closeIrrPanel(e) {
    if (e && e.target !== document.getElementById('irrOverlay')) return;
    document.getElementById('irrOverlay').classList.remove('open');
}

function renderIrrList() {
    const list = document.getElementById('irrList');
    if (irrelevantIds.length === 0) {
        list.innerHTML = '<div class="irr-empty">Még nincsenek megjelölt hatóanyagok.<br><span style="opacity:.6;font-size:12px;">A 🚫 gombbal tudod megjelölni a számodra nem releváns anyagokat.</span></div>';
        return;
    }
    const drugs = irrelevantIds.map(id => allDrugs.find(d => d.id === id)).filter(Boolean);
    list.innerHTML = drugs.map(d => `
        <div class="irr-item" id="irr-${d.id}">
            <div style="flex:1">
                <div class="irr-item-name">${d.name}</div>
                <div class="irr-item-cat">${d.category}</div>
            </div>
            <button class="irr-item-del" onclick="removeIrrelevant('${d.id}')">✕ Visszaállít</button>
        </div>
    `).join('');
}

function removeIrrelevant(id) {
    irrelevantIds = irrelevantIds.filter(x => x !== id);
    saveIrrelevant();
    // Visszakerül a paklijába
    changeCategory();
    renderIrrList();
}

function clearAllIrrelevant() {
    if (!confirm(`Biztosan visszaállítod mind a ${irrelevantIds.length} megjelölt hatóanyagot?`)) return;
    irrelevantIds = [];
    saveIrrelevant();
    changeCategory();
    renderIrrList();
}

function exportIrrelevantList() {
    if (irrelevantIds.length === 0) {
        showToast("Nincs megjelölt hatóanyag!", false);
        return;
    }
    const drugs = irrelevantIds.map(id => allDrugs.find(d => d.id === id)).filter(Boolean);
    const text = drugs.map(d => `${d.name} (${d.category}) — id: ${d.id}`).join('\n');
    navigator.clipboard.writeText(text).then(() => {
        showToast(`${drugs.length} hatóanyag másolva! 📋`, true);
    }).catch(() => {
        // Fallback: prompt-ban mutatjuk
        prompt("Másold ki a listát:", text);
    });
}
    init();
</script>
